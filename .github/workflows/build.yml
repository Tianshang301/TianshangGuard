name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build ${{ matrix.flavor }} Debug
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [zh, en, unified]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set JVM heap
        run: printf '\norg.gradle.jvmargs=-Xmx4g\n' >> gradle.properties

      - name: Build ${{ matrix.flavor }} Debug
        run: ./gradlew assemble${{ matrix.flavor }}Debug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.flavor }}-debug
          path: app/build/outputs/apk/${{ matrix.flavor }}/debug/app-${{ matrix.flavor }}-debug.apk

name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Tune Gradle memory
        run: |
          sed -i 's/^org\.gradle\.jvmargs=.*/org.gradle.jvmargs=-Xmx5g -Dfile.encoding=UTF-8/' gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties

      - name: Build Zh Debug
        run: ./gradlew assembleZhDebug --no-daemon --max-workers=1

      - name: Build En Debug
        run: ./gradlew assembleEnDebug --no-daemon --max-workers=1

      - name: Build Unified Debug
        run: ./gradlew assembleUnifiedDebug --no-daemon --max-workers=1

      - name: Upload Zh APK
        uses: actions/upload-artifact@v4
        with:
          name: app-zh-debug
          path: app/build/outputs/apk/zh/debug/app-zh-debug.apk

      - name: Upload En APK
        uses: actions/upload-artifact@v4
        with:
          name: app-en-debug
          path: app/build/outputs/apk/en/debug/app-en-debug.apk

      - name: Upload Unified APK
        uses: actions/upload-artifact@v4
        with:
          name: app-unified-debug
          path: app/build/outputs/apk/unified/debug/app-unified-debug.apk

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: Unit Tests (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [zh, en, unified]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Run unit tests with coverage
        run: ./gradlew test${{ matrix.flavor }}DebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.flavor }}
          path: app/build/reports/tests/test${{ matrix.flavor }}DebugUnitTest/

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - name: Run unified tests
        run: ./gradlew testUnifiedDebugUnitTest jacocoTestReport --no-daemon
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/jacocoTestReport/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew lintZhDebug --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results*

  build:
    name: Build ${{ matrix.flavor }} Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [unit-test, lint]
    strategy:
      fail-fast: false
      matrix:
        flavor: [zh, en, unified]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          mkdir -p app
          printf '%s' "$KEYSTORE_B64" > /tmp/keystore.b64
          base64 -d /tmp/keystore.b64 > app/release.jks
          rm -f /tmp/keystore.b64
      - name: Build ${{ matrix.flavor }} Release
        run: |
          printf '\norg.gradle.jvmargs=-Xmx4g\n' >> gradle.properties
          ./gradlew assemble${{ matrix.flavor }}Release --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.flavor }}-release
          path: app/build/outputs/apk/${{ matrix.flavor }}/release/app-${{ matrix.flavor }}-release.apk

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Increase Gradle heap
        run: echo "org.gradle.jvmargs=-Xmx4g" >> gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Check formatting (ktlint)
        run: ./gradlew ktlintCheck --no-daemon || echo "ktlint not configured, skipping"

      - name: Run unit tests
        run: ./gradlew testZhDebugUnitTest --no-daemon

      - name: Build Zh Debug
        run: ./gradlew assembleZhDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-zh-debug
          path: app/build/outputs/apk/zh/debug/app-zh-debug.apk
